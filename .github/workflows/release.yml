name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create, for example v1.0.0"
        required: true
      release_name:
        description: "Optional release title"
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release JAR
        run: ./gradlew shadowJar

      - name: Generate SHA256 checksum
        run: sha256sum build/libs/burp-rpc.jar > build/libs/burp-rpc.jar.sha256

      - name: Resolve release metadata
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "release_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            if [ -n "${{ github.event.inputs.release_name }}" ]; then
              echo "release_name=${{ github.event.inputs.release_name }}" >> "$GITHUB_OUTPUT"
            else
              echo "release_name=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          files: |
            build/libs/burp-rpc.jar
            build/libs/burp-rpc.jar.sha256
          generate_release_notes: true
