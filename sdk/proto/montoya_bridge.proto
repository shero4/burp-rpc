syntax = "proto3";

package burp.montoya.bridge;

option java_package = "burp.montoya.bridge.proto";
option java_multiple_files = true;

// HTTP service (host, port, secure)
message HttpService {
  string host = 1;
  int32 port = 2;
  bool secure = 3;
}

// Annotations (notes, highlight color)
message Annotations {
  string notes = 1;
  string highlight_color = 2;  // e.g. "RED", "ORANGE", "YELLOW", "GREEN", "CYAN", "BLUE", "PINK", "MAGENTA", "GRAY"
}

// HTTP request - raw bytes as base64 for binary safety
message HttpRequestMessage {
  HttpService http_service = 1;
  string raw_bytes_base64 = 2;  // Full HTTP request as base64
}

// HTTP response - raw bytes as base64
message HttpResponseMessage {
  string raw_bytes_base64 = 1;  // Full HTTP response as base64
}

// Proxy history entry (ProxyHttpRequestResponse)
message ProxyHistoryEntry {
  int32 id = 1;
  HttpRequestMessage request = 2;
  HttpResponseMessage response = 3;   // Optional - may be absent if no response yet
  bool has_response = 4;
  Annotations annotations = 5;
  string time_iso = 6;         // ZonedDateTime as ISO-8601 string
  int32 listener_port = 7;
  bool edited = 8;
}

// Site map / HTTP request-response pair (HttpRequestResponse from sitemap)
message SiteMapEntry {
  HttpRequestMessage request = 1;
  HttpResponseMessage response = 2;   // Optional
  bool has_response = 3;
  Annotations annotations = 4;
}

// Request for GetProxyHistory
message GetProxyHistoryRequest {
  // Empty for now - could add filter later
}

// Response for GetProxyHistory
message GetProxyHistoryResponse {
  repeated ProxyHistoryEntry entries = 1;
}

// Request for SendHttpRequest
message SendHttpRequestRequest {
  HttpRequestMessage request = 1;
}

// Response for SendHttpRequest
message SendHttpRequestResponse {
  HttpRequestMessage request = 1;  // Echo of sent request
  HttpResponseMessage response = 2;  // Response received
  bool has_response = 3;
}

// Request for GetSiteMap
message GetSiteMapRequest {
  // Empty for now - could add filter later
}

// Response for GetSiteMap
message GetSiteMapResponse {
  repeated SiteMapEntry entries = 1;
}

// Request for SendToRepeater
message SendToRepeaterRequest {
  HttpRequestMessage request = 1;
  string tab_name = 2;  // Optional tab caption in Repeater UI
}

// Response for SendToRepeater
message SendToRepeaterResponse {
  // Empty - confirms the request was sent to Repeater
}

// ─── Lightweight proxy history (no raw bodies) ──────────────────────

message ProxyHistorySummaryEntry {
  int32 id = 1;
  string host = 2;
  int32 port = 3;
  bool secure = 4;
  string method = 5;
  string path = 6;
  int32 status_code = 7;
  string content_type = 8;
  int32 request_length = 9;
  int32 response_length = 10;
  string time_iso = 11;
}

message GetProxyHistorySummaryRequest {
  string search = 1;           // case-insensitive substring match on host, path, content_type
  repeated string methods = 2; // e.g. ["GET","POST"] -- empty means all
  int32 status_min = 3;        // 0 = no lower bound
  int32 status_max = 4;        // 0 = no upper bound
  bool hide_assets = 5;        // exclude static asset extensions and image/font content types
}

message GetProxyHistorySummaryResponse {
  repeated ProxyHistorySummaryEntry entries = 1;
}

// ─── Single proxy entry by ID (full raw data) ───────────────────────

message GetProxyEntryRequest {
  int32 id = 1;
}

message GetProxyEntryResponse {
  ProxyHistoryEntry entry = 1;
}

// ─── Intruder ────────────────────────────────────────────────────────

message IntruderInsertionPoint {
  int32 start_offset = 1;
  int32 end_offset = 2;
}

message SendToIntruderRequest {
  HttpRequestMessage request = 1;
  string tab_name = 2;
  repeated IntruderInsertionPoint insertion_points = 3;
}

message SendToIntruderResponse {}

// ─── Repeater send-and-receive ───────────────────────────────────────

message SendAndReceiveRepeaterRequest {
  HttpRequestMessage request = 1;
}

message SendAndReceiveRepeaterResponse {
  HttpRequestMessage request = 1;
  HttpResponseMessage response = 2;
  bool has_response = 3;
}

// ─── Collaborator ────────────────────────────────────────────────────

message GenerateCollaboratorPayloadRequest {
  string custom_data = 1;  // Optional, max 16 alphanumeric chars
}

message GenerateCollaboratorPayloadResponse {
  string payload = 1;      // Full collaborator subdomain
  string server = 2;       // Collaborator server address
  string secret_key = 3;   // Secret key to restore client later
}

message PollCollaboratorRequest {
  string secret_key = 1;
}

message CollaboratorInteraction {
  string id = 1;
  string type = 2;         // DNS, HTTP, SMTP
  string timestamp = 3;
  string client_ip = 4;
  int32 client_port = 5;
  string custom_data = 6;
}

message PollCollaboratorResponse {
  repeated CollaboratorInteraction interactions = 1;
}

// ─── Proxy intercept control ─────────────────────────────────────────

message GetProxyInterceptStatusRequest {}

message GetProxyInterceptStatusResponse {
  bool enabled = 1;
}

message SetProxyInterceptRequest {
  bool enabled = 1;
}

message SetProxyInterceptResponse {}

// ─── BurpConnector gRPC service ──────────────────────────────────────

service BurpConnector {
  // Existing
  rpc GetProxyHistory(GetProxyHistoryRequest) returns (GetProxyHistoryResponse);
  rpc SendHttpRequest(SendHttpRequestRequest) returns (SendHttpRequestResponse);
  rpc GetSiteMap(GetSiteMapRequest) returns (GetSiteMapResponse);
  rpc SendToRepeater(SendToRepeaterRequest) returns (SendToRepeaterResponse);

  // New - lightweight proxy
  rpc GetProxyHistorySummary(GetProxyHistorySummaryRequest) returns (GetProxyHistorySummaryResponse);
  rpc GetProxyEntry(GetProxyEntryRequest) returns (GetProxyEntryResponse);

  // New - Intruder
  rpc SendToIntruder(SendToIntruderRequest) returns (SendToIntruderResponse);

  // New - Repeater send-and-receive
  rpc SendAndReceiveRepeater(SendAndReceiveRepeaterRequest) returns (SendAndReceiveRepeaterResponse);

  // New - Collaborator
  rpc GenerateCollaboratorPayload(GenerateCollaboratorPayloadRequest) returns (GenerateCollaboratorPayloadResponse);
  rpc PollCollaborator(PollCollaboratorRequest) returns (PollCollaboratorResponse);

  // New - Proxy control
  rpc GetProxyInterceptStatus(GetProxyInterceptStatusRequest) returns (GetProxyInterceptStatusResponse);
  rpc SetProxyIntercept(SetProxyInterceptRequest) returns (SetProxyInterceptResponse);
}
